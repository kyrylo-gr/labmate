# This workflow is triggered manually (workflow_dispatch) before merging a PR
# into main. It automatically fixes common pre-merge issues: Ruff
# formatting/linting and missing version bumps.

name: Pre-merge Auto-fix

env:
  package-name: labmate

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Check and fix Ruff issues
        id: ruff_fix
        run: |
          ruff_failed=false
          ruff check . --output-format=github || ruff_failed=true
          ruff format --check . || ruff_failed=true

          if [ "$ruff_failed" = "true" ]; then
            echo "Ruff checks failed, applying fixes..."
            ruff check . --fix
            ruff format .
            echo "ruff_fixed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Ruff checks passed, no fixes needed."
            echo "ruff_fixed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check and fix version
        id: version_fix
        run: |
          git fetch origin main
          pr_version=$(grep '__version__' ${{ env.package-name }}/__config__.py | cut -d'"' -f2)
          main_version=$(git show origin/main:${{ env.package-name }}/__config__.py | grep '__version__' | cut -d'"' -f2)

          echo "Main branch version: $main_version"
          echo "PR branch version: $pr_version"

          if [ "$main_version" = "$pr_version" ]; then
            echo "Version is the same as main, bumping patch version..."
            if ! echo "$pr_version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Error: version '$pr_version' does not match expected X.Y.Z format"
              exit 1
            fi
            IFS='.' read -r major minor patch <<< "$pr_version"
            new_version="$major.$minor.$((patch + 1))"
            echo "New version: $new_version"
            sed -i "s/__version__ = \"$pr_version\"/__version__ = \"$new_version\"/" ${{ env.package-name }}/__config__.py
            echo "version_fixed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version is already different from main, no bump needed."
            echo "version_fixed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit fixes
        if: steps.ruff_fix.outputs.ruff_fixed == 'true' || steps.version_fix.outputs.version_fixed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if [ "${{ steps.ruff_fix.outputs.ruff_fixed }}" = "true" ] && [ "${{ steps.version_fix.outputs.version_fixed }}" = "true" ]; then
            commit_message="chore: apply ruff fixes and bump version"
          elif [ "${{ steps.ruff_fix.outputs.ruff_fixed }}" = "true" ]; then
            commit_message="chore: apply ruff formatting and lint fixes"
          else
            commit_message="chore: bump version for release"
          fi

          git commit -m "$commit_message"
          git push origin HEAD:${{ github.ref_name }}
